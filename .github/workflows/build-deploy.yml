name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install server dependencies
        working-directory: ./server
        run: npm install
      
      - name: Install client dependencies and build
        working-directory: ./client
        run: npm install && npm run build
      
      - name: Build server
        run: npm run build --workspace=server
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./deploy-package
      
      - name: Create deployment package
        run: |
          cd ./deploy-package
          zip -r app.zip . -x "node_modules/*" "client/node_modules/*" "server/node_modules/*" ".git/*" ".gitignore" "client/src/*" "server/src/*"
          ls -lah app.zip
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "app-jdtrack-wcus-001"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy-package/app.zip
